<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe AI</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            width: 100px;
            height: 100px;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Tic Tac Toe</h1>

<div class="board" id="board"></div>

<br>
<button onclick="reset()">Restart</button>

<script>
let board = [" "," "," "," "," "," "," "," "," "];

function play(i){
    if(board[i] !== " ") return;

    board[i] = "X";

    fetch("/move", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({board: board})
    })
    .then(res => res.json())
    .then(data => {
        if(data.move !== -1){
            board[data.move] = "O";
        }

        alert(
            "Minimax Time: " + data.minimax_time.toFixed(5) +
            "\nAlphaBeta Time: " + data.alphabeta_time.toFixed(5) +
            "\nMinimax Nodes: " + data.nodes_minimax +
            "\nAlphaBeta Nodes: " + data.nodes_ab
        );

        render();
    });

    render();
}

function render(){
    let html = "";
    for(let i = 0; i < 9; i++){
        html += `<button onclick="play(${i})">${board[i]}</button>`;
    }
    document.getElementById("board").innerHTML = html;
}

function reset(){
    board = [" "," "," "," "," "," "," "," "," "];
    render();
}

render();
</script>

</body>
</html>
